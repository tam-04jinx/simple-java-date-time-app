name: Java CI

on:
  push:
    branches: ["master","main"]
  pull_request:
    branches: ["master","main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn clean verify
      - run: docker build -t simple-java-date-time-app .
