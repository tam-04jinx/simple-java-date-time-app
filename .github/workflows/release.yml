name: Release

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn clean package
      - uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar
