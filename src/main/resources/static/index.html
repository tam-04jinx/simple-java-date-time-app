<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Java Date & Time App</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="page">
        <section class="card">
            <h1>World Clock</h1>

            <div class="datetime-panel">
                <div>
                    <span class="label">Server Date</span>
                    <strong id="date">Loading...</strong>
                </div>
                <div>
                    <span class="label">Server Time</span>
                    <strong id="time">Loading...</strong>
                </div>
            </div>

            <p class="timezone">
                Server timezone: <span id="timezone">Loading...</span>
            </p>

            <div class="city-picker">
                <label class="label" for="city-select">Choose cities to show on the map</label>
                <select id="city-select" multiple size="8" aria-describedby="city-help"></select>
                <p id="city-help" class="timezone">Hold Cmd on Mac or Ctrl on Windows to select multiple cities.</p>
            </div>

            <h2>Selected cities on the map</h2>
            <div id="world-map" class="world-map" aria-label="Interactive world map"></div>

            <section id="selected-time" class="selected-time" aria-live="polite">
                Select a city on the map to see the local time.
            </section>

            <h2>Selected Time Zones</h2>
            <div id="timezone-list" class="timezone-grid" aria-live="polite"></div>

            <button id="refresh-button" type="button">Refresh Now</button>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
