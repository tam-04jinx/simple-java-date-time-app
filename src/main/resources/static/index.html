<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Java Date & Time App</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="page">
        <section class="card">
            <p class="eyebrow">Spring Boot + Frontend</p>
            <h1>Current Date & Time</h1>

            <div class="datetime-panel">
                <div>
                    <span class="label">Date</span>
                    <strong id="date">Loading...</strong>
                </div>
                <div>
                    <span class="label">Time</span>
                    <strong id="time">Loading...</strong>
                </div>
            </div>

            <p class="timezone">
                Server timezone: <span id="timezone">Loading...</span>
            </p>

            <button id="refresh-button" type="button">Refresh Now</button>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
